# Scheduled job ingestion (spec §4).
#
# Runs here, NOT as a Vercel function: crawling + LLM extraction blows straight
# past Vercel's serverless timeout. GitHub Actions gives us free minutes and a
# real 60-minute budget.
#
# Twice daily matches the spec's cadence for deep verticals (§4.4) and keeps
# `lastVerifiedAt` fresh, which is what lets the feed and SEO pages honestly
# claim "verified live Xh ago". Re-crawling costs almost nothing: unchanged
# postings hit the description-hash cache and never reach the LLM.
#
# Embeddings are NOT done here. Voyage's free tier is 3 RPM and embed.ts backs
# off 20-40s on a 429, so inline embeddings leave every concurrent worker
# blocked and would blow the 60-minute budget. `Backfill embeddings` fills them
# in out of band; jobs ship LIVE meanwhile and the matcher falls back to
# recency until they land.
name: Ingest jobs

on:
  schedule:
    - cron: "0 2,14 * * *" # 02:00 and 14:00 UTC
  workflow_dispatch:
    inputs:
      max_jobs_per_source:
        description: "Cap jobs processed per source (blank = all)"
        required: false
        default: ""
      only:
        description: "Only these board slugs, comma-separated (blank = all)"
        required: false
        default: ""
      concurrency:
        description: "Jobs processed in parallel per board"
        required: false
        default: "8"
      inline_embeddings:
        description: "Embed during the crawl (slow: Voyage free tier is 3 RPM)"
        type: boolean
        required: false
        default: false

concurrency:
  group: ingest
  cancel-in-progress: false # never run two ingests at once

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci # postinstall runs `prisma generate`
      - name: Run ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: |
          ARGS="--concurrency=${{ inputs.concurrency || '8' }}"
          if [ "${{ inputs.inline_embeddings }}" != "true" ]; then
            ARGS="$ARGS --skip-embeddings"
          fi
          if [ -n "${{ inputs.max_jobs_per_source }}" ]; then
            ARGS="$ARGS --max-jobs-per-source=${{ inputs.max_jobs_per_source }}"
          fi
          if [ -n "${{ inputs.only }}" ]; then
            ARGS="$ARGS --only=${{ inputs.only }}"
          fi
          echo "npx tsx scripts/run-ingestion.ts $ARGS"
          npx tsx scripts/run-ingestion.ts $ARGS
